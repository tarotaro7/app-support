<!DOCTYPE html>

    <title>okawariCookie - アプリサポート</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
            background: #FFF8F0;
            color: #32281E;
            line-height: 1.8;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 60px 24px;
        }
        .header {
            text-align: center;

            transition: transform 0.2s;
        }
        .app-card:hover {
            transform: translateY(-2px);
        }
        .app-card h2 {
            font-size: 22px;
            margin-bottom: 8px;
        }
        .app-card p {
            font-size: 15px;
            color: #5A4A3E;
            margin-bottom: 16px;
        }
        .app-links a {
            display: inline-block;
            color: #C8785F;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            margin-right: 24px;
        }
        .app-links a:hover {
            text-decoration: underline;
        }
        .footer {
            text-align: center;
            margin-top: 48px;
            color: #A08878;
            font-size: 13px;
        }
        .footer a {
            color: #A08878;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }

</head>
